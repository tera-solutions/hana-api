                  example: '2026-08-31'
                priority:
                  type: integer
                  description: 'Độ ưu tiên khi chọn khuyến mãi tốt nhất. Must be at least 0.'
                  example: 10
                  nullable: true
                discount_type:
                  type: string
                  description: 'percent | fixed.'
                  example: percent
                  enum:
                    - percent
                    - fixed
                  nullable: true
                discount_value:
                  type: number
                  description: 'Giá trị giảm (theo % hoặc số tiền). Must be at least 0.'
                  example: 10.0
                  nullable: true
                max_discount:
                  type: number
                  description: 'Mức giảm tối đa (với loại percent). Must be at least 0.'
                  example: 500000.0
                  nullable: true
                bonus_lesson:
                  type: integer
                  description: 'Số buổi học tặng. Must be at least 0.'
                  example: 2
                  nullable: true
                bonus_wallet_amount:
                  type: number
                  description: 'Số credit ví tặng. Must be at least 0.'
                  example: 200000.0
                  nullable: true
                rules:
                  type: array
                  description: 'Điều kiện áp dụng [{rule_type, rule_value}].'
                  example:
                    -
                      rule_type: min_order
                      rule_value: '5000000'
                  items:
                    type: object
                    nullable: true
                    properties:
                      rule_type:
                        type: string
                        description: 'This field is required when <code>rules</code> is present.'
                        example: consequatur
                      rule_value:
                        type: string
                        description: ''
                        example: consequatur
                        nullable: true
                rewards:
                  type: array
                  description: 'Phần thưởng [{reward_type, reward_value}].'
                  example:
                    -
                      reward_type: discount
                      reward_value: '10'
                  items:
                    type: object
                    nullable: true
                    properties:
                      reward_type:
                        type: string
                        description: 'This field is required when <code>rewards</code> is present.'
                        example: consequatur
                      reward_value:
                        type: string
                        description: ''
                        example: consequatur
                        nullable: true
              required:
                - promotion_name
                - promotion_type
                - start_date
                - end_date
