                  description: 'Tên chương trình. Must not be greater than 255 characters.'
                  example: 'Hè 2026'
                promotion_type:
                  type: string
                  description: 'Loại: discount | gift_lesson | wallet_credit | voucher | referral | combo.'
                  example: discount
                  enum:
                    - discount
                    - gift_lesson
                    - wallet_credit
                    - voucher
                    - referral
                    - combo
                start_date:
                  type: string
