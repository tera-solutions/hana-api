openapi: 3.0.3
info:
  title: 'Hana-English API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'https://api.anhnguhana.com'
tags:
  -
    name: 'CRM - Lead'
    description: "\nManage leads / prospective customers (lead.md §2–§7)."
  -
    name: 'CRM - Lead Guardians'
    description: "\nManage the guardians of a lead (lead.md §8 \"Quản lý Người giám hộ\")."
  -
    name: 'CRM - Lead Students'
    description: "\nManage the students linked to a lead (lead.md §9 \"Liên kết học viên\")."
  -
    name: 'CRM - Parent'
    description: "\nManage parents / guardians."
  -
    name: 'CRM - Parent Student'
    description: "\nManage the parent ↔ student relationships."
  -
    name: 'Core - Authentication'
    description: "\nLogin, registration, OTP, password reset and related account flows.\nMost endpoints are public; ones marked @authenticated require a bearer token."
  -
    name: 'Core - Common'
    description: "\nDevice bootstrap and calendar helpers. Public (no token required)."
  -
    name: 'Core - File'
    description: "\nUpload / download / import files. Requires a bearer token and a `device-code` header."
  -
    name: 'Core - Health'
    description: "\nLiveness / connectivity probes. These endpoints are public (no token required)."
  -
    name: 'Core - Metadata'
    description: "\nFrontend bootstrap data: every model enumeration (status, type, gender, …) as\n`{ key, value, label }` lists, grouped by domain. `key` is the UPPER_SNAKE enum\nidentifier (stable), `value` the wire value, `label` the Vietnamese display text.\nFetch once after login to populate dropdowns, status badges and filters without\nhardcoding option lists."
  -
    name: 'Core - User'
    description: "\nAuthenticated user's own profile."
  -
    name: 'Education - Assignment'
    description: "\nCreate, publish, assign, collect and grade student assignments (assignment.md)."
  -
    name: 'Education - Assignment Submission'
    description: "\nGrade and publish results of student submissions (assignment.md §9, §10)."
  -
    name: 'Education - Class'
    description: "\nManage classes (lớp học) — the core operational unit linking courses, students,\nteachers, rooms, curriculum and attendance."
  -
    name: 'Education - Class Schedule'
    description: "\nManage schedules (lịch học) attached to a class."
  -
    name: 'Education - Class Session'
    description: "\nManage sessions (buổi học) — the operational unit of a class, linking attendance,\nteachers, revenue, tags and feedback."
  -
    name: 'Education - Course'
    description: "\nManage courses (training catalogue)."
  -
    name: 'Education - Enrollment'
    description: "\nManage enrollments (ghi danh) — the \"hợp đồng học tập\" linking a student to a\nclass, its lesson package, tuition, debt, transfers and suspensions."
  -
    name: 'Education - Exam'
    description: "\nManage the exam bank and its questions (exam.md §VI, §VII)."
  -
    name: 'Education - Exam Result'
    description: "\nGrade sittings, publish results and promote on a passing result (exam.md §XI–§XIII).\nThe {id} path parameter is the exam registration ID (a candidate's slot in a sitting)."
  -
    name: 'Education - Exam Session'
    description: "\nSchedule exam sittings, seat rooms/invigilators and register candidates (exam.md §VIII, §IX)."
  -
    name: 'Education - Exam Versions'
    description: "\nManage an exam's version lineage (exam.md §IV \"Version đề thi\")."
  -
    name: 'Education - Lesson'
    description: "\nManage the actual per-class lessons generated from a lesson plan."
  -
    name: 'Education - Lesson Plan'
    description: "\nManage teaching lesson plans (templates) per course and level."
  -
    name: 'Education - Lesson Plan Lessons'
    description: "\nManage lesson templates and materials inside a lesson plan."
  -
    name: 'Education - Lesson Plan Materials'
    description: "\nAttach and detach learning materials on a lesson template (lesson-plan.md §14)."
  -
    name: 'Education - Lesson Plan Versions'
    description: "\nBrowse the published-version history of a lesson plan (lesson-plan.md §13)."
  -
    name: 'Education - Level'
    description: "\nLevel master: the learning-path catalogue of proficiency levels per course\n(student-level.md §V)."
  -
    name: 'Education - Material'
    description: "\nCentral learning-resource library: documents, versioning and links to courses,\nlesson plans, lessons and assignments (material.md)."
  -
    name: 'Education - Material Category'
    description: "\nDocument-library taxonomy (material.md §6)."
  -
    name: 'Education - Question'
    description: "\nQuestion bank: author, review, version and reuse questions, and auto-generate exams\nfrom them (question.md)."
  -
    name: 'Education - Question Category'
    description: "\nManage the question bank category hierarchy (question.md §XV)."
  -
    name: 'Education - Question Tag'
    description: "\nManage the question bank tags (question.md §IV, §XV)."
  -
    name: 'Education - Question Versions'
    description: "\nBrowse a question's version history (question.md §IV \"Version câu hỏi\"). Snapshots are\nrecorded automatically when an in-use question is edited (BR007)."
  -
    name: 'Education - Room'
    description: "\nManage classrooms (physical rooms) used for scheduling classes and sessions."
  -
    name: 'Education - Student'
    description: "\nManage students (enrollment lifecycle)."
  -
    name: 'Education - Student Level'
    description: "\nA student's current proficiency level: placement, promotion, manual adjustment\nand change history (student-level.md)."
  -
    name: 'Finance - Account'
    description: "\nManage funds (quỹ) — cash, bank, e-wallet — whose balances move with confirmed\npayments (payment.md §VI)."
  -
    name: 'Finance - Debt'
    description: "\nReceivable/payable debt computed live from invoices and payments, with aging,\ndashboard, adjustments, write-off approval, collection and reconciliation (debt.md)."
  -
    name: 'Finance - Invoice'
    description: "\nManage receivable and payable invoices, their approval, payments and lifecycle\n(invoice.md)."
  -
    name: 'Finance - Payment'
    description: "\nRecord and manage real cash-flow transactions — receipts (IN) and disbursements\n(OUT) — with confirm/cancel/reverse/refund and fund-balance effects (payment.md)."
  -
    name: 'Finance - Promotion'
    description: "\nManage promotion programmes, their lifecycle, vouchers and the apply engine\n(promotion.md)."
  -
    name: 'Finance - Referral'
    description: "\nManage parent-to-parent referrals and their rewards (promotion.md §XI)."
  -
    name: 'HR - Teacher'
    description: "\nManage teachers (full lifecycle, specialisations, certificates)."
  -
    name: 'HR - Teacher Certificate'
    description: "\nManage a teacher's professional certificates."
  -
    name: 'System - Activity Log'
    description: "\nRead-only system audit trail (spec 028). Logs are immutable — there is no\ncreate/update/delete endpoint (BR-02, BR-03, BR-06)."
  -
    name: 'System - Branch'
    description: "\nManage branches (cơ sở) belonging to a Business."
  -
    name: 'System - Business'
    description: "\nManage businesses (centers / branches)."
  -
    name: 'System - User'
    description: "\nManage system user accounts."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by visiting your dashboard and clicking <b>Generate API token</b>.'
security:
  -
    default: []
paths:
  /v1/crm/lead/list:
    get:
      summary: 'List leads'
      operationId: listLeads
      description: ''
      parameters:
        -
          in: query
          name: search
          description: 'Search by code, name, email or phone.'
          example: Nguyễn
          required: false
          schema:
            type: string
            description: 'Search by code, name, email or phone.'
            example: Nguyễn
        -
          in: query
          name: business_id
          description: 'Filter by business id.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by business id.'
            example: 1
        -
          in: query
          name: branch_id
          description: 'Filter by branch id.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by branch id.'
            example: 1
        -
          in: query
          name: status
          description: 'Filter by status: pending, verified, studying, inactive.'
          example: pending
          required: false
          schema:
            type: string
            description: 'Filter by status: pending, verified, studying, inactive.'
            example: pending
        -
          in: query
          name: source
          description: 'Filter by lead source.'
          example: facebook
          required: false
          schema:
            type: string
            description: 'Filter by lead source.'
            example: facebook
        -
          in: query
          name: owner_id
          description: 'Filter by assigned staff id.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by assigned staff id.'
            example: 1
        -
          in: query
          name: name
          description: 'Partial match on name.'
          example: 'Văn A'
          required: false
          schema:
            type: string
            description: 'Partial match on name.'
            example: 'Văn A'
        -
          in: query
          name: email
          description: 'Partial match on email.'
          example: example.com
          required: false
          schema:
            type: string
            description: 'Partial match on email.'
            example: example.com
        -
          in: query
          name: phone
          description: 'Partial match on phone.'
          example: '0901'
          required: false
          schema:
            type: string
            description: 'Partial match on phone.'
            example: '0901'
        -
          in: query
          name: contacted_from
          description: 'date Filter leads contacted on or after (Y-m-d).'
          example: '2026-01-01'
          required: false
          schema:
            type: string
            description: 'date Filter leads contacted on or after (Y-m-d).'
            example: '2026-01-01'
        -
          in: query
          name: contacted_to
          description: 'date Filter leads contacted on or before (Y-m-d).'
          example: '2026-12-31'
          required: false
          schema:
            type: string
            description: 'date Filter leads contacted on or before (Y-m-d).'
            example: '2026-12-31'
        -
          in: query
          name: tag_ids
          description: 'Filter by tag ids.'
          example:
            - 1
            - 2
          required: false
          schema:
            type: array
            description: 'Filter by tag ids.'
            example:
              - 1
              - 2
            items:
              type: integer
        -
          in: query
          name: course_ids
          description: 'Filter by interested course ids.'
          example:
            - 1
          required: false
          schema:
            type: array
            description: 'Filter by interested course ids.'
            example:
              - 1
            items:
              type: integer
        -
          in: query
          name: sort_by
          description: 'Sort column: code, name, status, created_at.'
          example: created_at
          required: false
          schema:
            type: string
            description: 'Sort column: code, name, status, created_at.'
            example: created_at
        -
          in: query
          name: sort_dir
          description: 'Sort direction: asc or desc (default desc).'
          example: desc
          required: false
          schema:
            type: string
            description: 'Sort direction: asc or desc (default desc).'
            example: desc
        -
          in: query
          name: per_page
          description: 'Page size: 20, 50 or 100 (default 20).'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Page size: 20, 50 or 100 (default 20).'
            example: 20
        -
          in: query
          name: page
          description: 'Page number (default 1).'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number (default 1).'
            example: 1
